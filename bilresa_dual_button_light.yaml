blueprint:
  name: IKEA BILRESA dual button - generic actions
  description: >
    Generic automation blueprint for the IKEA BILRESA dual Matter button.

    Supports:
    - Button 1 single press
    - Button 1 double press
    - Button 1 long press
    - Button 2 single press
    - Button 2 double press
    - Button 2 long press

    Default event names:
    - single press: multi_press_1
    - double press: multi_press_2
    - long press: long_press

    The blueprint triggers on any update of the event entities and then
    evaluates the event_type attribute, so repeated presses with the same
    event_type still work.

  domain: automation

  input:
    button_1_event:
      name: Button 1 event entity
      description: Event entity for the upper/left button
      selector:
        entity:
          domain: event

    button_2_event:
      name: Button 2 event entity
      description: Event entity for the lower/right button
      selector:
        entity:
          domain: event

    single_press_event:
      name: Single press event_type
      description: event_type value for a single press
      default: multi_press_1
      selector:
        text: {}

    double_press_event:
      name: Double press event_type
      description: event_type value for a double press
      default: multi_press_2
      selector:
        text: {}

    long_press_event:
      name: Long press event_type
      description: event_type value for a long press
      default: long_press
      selector:
        text: {}

    button_1_single_action:
      name: Button 1 single press action
      default: []
      selector:
        action: {}

    button_1_double_action:
      name: Button 1 double press action
      default: []
      selector:
        action: {}

    button_1_long_action:
      name: Button 1 long press action
      default: []
      selector:
        action: {}

    button_2_single_action:
      name: Button 2 single press action
      default: []
      selector:
        action: {}

    button_2_double_action:
      name: Button 2 double press action
      default: []
      selector:
        action: {}

    button_2_long_action:
      name: Button 2 long press action
      default: []
      selector:
        action: {}

mode: single

triggers:
  - trigger: state
    entity_id: !input button_1_event
    id: button_1

  - trigger: state
    entity_id: !input button_2_event
    id: button_2

conditions: []

actions:
  - variables:
      event_type: "{{ trigger.to_state.attributes.event_type | default('') }}"
      single_press_event: !input single_press_event
      double_press_event: !input double_press_event
      long_press_event: !input long_press_event

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_1' and event_type == single_press_event }}
        sequence: !input button_1_single_action

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_1' and event_type == double_press_event }}
        sequence: !input button_1_double_action

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_1' and event_type == long_press_event }}
        sequence: !input button_1_long_action

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_2' and event_type == single_press_event }}
        sequence: !input button_2_single_action

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_2' and event_type == double_press_event }}
        sequence: !input button_2_double_action

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_2' and event_type == long_press_event }}
        sequence: !input button_2_long_action