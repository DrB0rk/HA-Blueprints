blueprint:
  name: Zigbee door sensor event - light on open, off on close
  description: >
    For Zigbee door/contact sensors that fire On/Off style events or update an
    on_off attribute. Turns a light on when the sensor reports open/on and
    turns it off when the sensor reports close/off.
  domain: automation

  input:
    sensor_event_entity:
      name: Sensor event entity
      description: The event entity for the Zigbee door sensor
      selector:
        entity:
          domain: event

    light_target:
      name: Light target
      selector:
        target:
          entity:
            domain: light

    transition_on:
      name: Turn-on transition
      default: 0
      selector:
        number:
          min: 0
          max: 30
          mode: slider
          unit_of_measurement: s

    transition_off:
      name: Turn-off transition
      default: 0
      selector:
        number:
          min: 0
          max: 30
          mode: slider
          unit_of_measurement: s

mode: restart

triggers:
  - trigger: state
    entity_id: !input sensor_event_entity

conditions: []

actions:
  - variables:
      event_type: "{{ trigger.to_state.attributes.event_type | default('') | lower }}"
      event_state: "{{ trigger.to_state.state | default('') | lower }}"
      args: "{{ trigger.to_state.attributes.event_arguments | default({}) }}"
      attr_name: "{{ args.attribute_name | default('') | lower }}"
      attr_value: "{{ args.attribute_value | default(none) }}"
      raw_value: "{{ args.value | default(none) }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{
                event_type == 'on'
                or event_state == 'on'
                or (attr_name == 'on_off' and (attr_value == 1 or raw_value == 1))
              }}
        sequence:
          - action: light.turn_on
            target: !input light_target
            data:
              transition: !input transition_on

      - conditions:
          - condition: template
            value_template: >
              {{
                event_type == 'off'
                or event_state == 'off'
                or (attr_name == 'on_off' and (attr_value == 0 or raw_value == 0))
              }}
        sequence:
          - action: light.turn_off
            target: !input light_target
            data:
              transition: !input transition_off
