blueprint:
  name: ZHA door/contact event to light
  description: >
    Turn a light on when a ZHA sensor sends an On event, and off when it sends an Off event.
  domain: automation

  input:
    device_ieee:
      name: Device IEEE address
      description: IEEE address of the ZHA sensor, for example 00:12:4b:00:xx:xx:xx:xx
      selector:
        text: {}

    light_target:
      name: Light target
      selector:
        target:
          entity:
            domain: light

    transition_on:
      name: Turn-on transition
      default: 0
      selector:
        number:
          min: 0
          max: 30
          mode: slider
          unit_of_measurement: s

    transition_off:
      name: Turn-off transition
      default: 0
      selector:
        number:
          min: 0
          max: 30
          mode: slider
          unit_of_measurement: s

mode: restart

triggers:
  - trigger: event
    event_type: zha_event

conditions:
  - condition: template
    value_template: >
      {{ trigger.event.data.device_ieee == !input device_ieee }}

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{
                trigger.event.data.command | default('') | lower == 'on'
                or (
                  trigger.event.data.command | default('') | lower == 'attribute_updated'
                  and trigger.event.data.args.attribute_name | default('') == 'on_off'
                  and trigger.event.data.args.attribute_value | int == 1
                )
              }}
        sequence:
          - action: light.turn_on
            target: !input light_target
            data:
              transition: !input transition_on

      - conditions:
          - condition: template
            value_template: >
              {{
                trigger.event.data.command | default('') | lower == 'off'
                or (
                  trigger.event.data.command | default('') | lower == 'attribute_updated'
                  and trigger.event.data.args.attribute_name | default('') == 'on_off'
                  and trigger.event.data.args.attribute_value | int == 0
                )
              }}
        sequence:
          - action: light.turn_off
            target: !input light_target
            data:
              transition: !input transition_off
